version: "3.9"

services:
  samsung-docs:
    image: nginx:latest
    container_name: samsung_docs
    volumes:
      - ./public:/usr/share/nginx/html:ro
    ports:
      - "8080:80"
    restart: unless-stopped

  samsung-api:
    build: .
    container_name: samsung_api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    restart: unless-stopped
